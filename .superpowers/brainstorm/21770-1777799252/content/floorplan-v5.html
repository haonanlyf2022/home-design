<div class="section" style="margin-top:16px;">
  <h3>v5 关键调整</h3>
  <ul>
    <li><strong>南边平齐</strong>：主卧南侧、次卧南侧、客餐厅南侧均在同一条水平线（红色虚线）</li>
    <li><strong>厨房+玄关</strong>向北凸出约2m，超出主体北墙</li>
    <li><strong>阳台</strong>向南凸出1.35m，超出南边齐平线</li>
    <li><strong>主卧N-S</strong>：含主卫在内共约6.7m（其中主卫2.7m + 卧室主体4.0m≈4.2m）</li>
    <li><strong>厨房-公卫互嵌</strong>：红色虚线标示</li>
  </ul>
