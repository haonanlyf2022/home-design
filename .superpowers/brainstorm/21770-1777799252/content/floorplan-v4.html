<h2>户型图（按尺寸数据绘制）</h2>
<p class="subtitle">比例 1m=40px，标注尺寸和门窗位置</p>

<div class="mockup">

      <rect x="0" y="0" width="62" height="108" fill="#b3d9ff" stroke="#333" stroke-width="2"/>
      <text x="31" y="50" text-anchor="middle" font-size="9" fill="#333">主卫</text>
      <text x="31" y="64" text-anchor="middle" font-size="7" fill="#666">2.7×1.55</text>
      <!-- 飘窗 -->
      <line x1="10" y1="2" x2="52" y2="2" stroke="#1976d2" stroke-width="3"/>
      <text x="31" y="-4" text-anchor="middle" font-size="7" fill="#1976d2">飘窗</text>

      <!-- ========== 主卧 (4.2×3.0) ========== -->
      <rect x="0" y="0" width="120" height="168" fill="#bbdefb" fill-opacity="0.5" stroke="#333" stroke-width="2"/>

      <text x="90" y="110" text-anchor="middle" font-size="7" fill="#666">4.2×3.0</text>

      <text x="120" y="50" text-anchor="middle" font-size="9" fill="#333">书房</text>
      <text x="120" y="64" text-anchor="middle" font-size="7" fill="#666">2.7×2.4</text>

      <text x="199" y="52" text-anchor="middle" font-size="7" fill="#666">2.1×1.55</text>

      <!-- 书房门(北墙偏西) -->

      <text x="296" y="125" text-anchor="middle" font-size="10" fill="#333" font-weight="bold">客餐厅</text>
      <text x="296" y="140" text-anchor="middle" font-size="7" fill="#666">5.45×3.2</text>

      <line x1="280" y1="198" x2="310" y2="198" stroke="#8d6e63" stroke-width="2"/>
      <text x="295" y="212" text-anchor="middle" font-size="6" fill="#8d6e63">阳台门</text>

      <!-- ========== 次卧 (3.05×2.5) - 走道南面 ========== -->
      <rect x="120" y="168" width="100" height="100" fill="#c8e6c9" stroke="#333" stroke-width="2"/>
      <text x="170" y="212" text-anchor="middle" font-size="9" fill="#333">次卧</text>
      <text x="170" y="228" text-anchor="middle" font-size="7" fill="#666">3.05×2.5</text>

      <line x1="135" y1="266" x2="205" y2="266" stroke="#388e3c" stroke-width="3"/>
      <text x="170" y="280" text-anchor="middle" font-size="7" fill="#388e3c">飘窗</text>
      <!-- 次卧门(走道南墙偏东) -->
      <line x1="190" y1="168" x2="205" y2="168" stroke="#5d4037" stroke-width="2"/>
      <text x="200" y="164" text-anchor="middle" font-size="6" fill="#5d4037">次卧门</text>

      <!-- ========== 阳台 (3.2×1.35) - 客餐厅南面, 凸出 ========== -->
      <rect x="232" y="198" width="128" height="54" fill="#b2dfdb" stroke="#333" stroke-width="2"/>
      <text x="296" y="222" text-anchor="middle" font-size="9" fill="#333">阳台</text>
      <text x="296" y="236" text-anchor="middle" font-size="7" fill="#666">3.2×1.35</text>

      <!-- ========== 标注线 ========== -->
      <!-- 南边对齐线 -->
      <line x1="10" y1="268" x2="380" y2="268" stroke="#e53935" stroke-width="2" stroke-dasharray="8,4"/>
      <text x="390" y="272" font-size="8" fill="#e53935">主卧/次卧/客餐厅 南边齐平</text>

      <!-- 方向指示 -->
      <text x="420" y="80" font-size="14" fill="#333">北 ↑</text>

      <!-- 尺寸标注: E-W总宽 -->
      <line x1="0" y1="300" x2="360" y2="300" stroke="#333" stroke-width="1"/>
      <line x1="0" y1="295" x2="0" y2="305" stroke="#333" stroke-width="1"/>
      <line x1="360" y1="295" x2="360" y2="305" stroke="#333" stroke-width="1"/>
      <text x="180" y="314" text-anchor="middle" font-size="8" fill="#333">约9.0m (E-W)</text>

      <!-- 面积标注 -->
      <text x="420" y="180" font-size="9" fill="#666">建筑面积: 99㎡</text>
